{% extends 'core/base.html' %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="container-sm">
  <div class="page-header">
    <h1>My Profile</h1>
    <p>Manage your account settings</p>
  </div>
  <div class="card">
    <div class="card-header">
      <span class="card-title"><i class="fas fa-user-cog" style="color:var(--gold);"></i> Account Settings</span>
    </div>
    <div class="card-body">
      <div style="display:flex;align-items:center;gap:20px;margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border);">
        <div style="width:72px;height:72px;background:linear-gradient(135deg,var(--navy),var(--navy-mid));border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);">
          {{ user.username|first|upper }}
        </div>
        <div>
          <div style="font-size:1.2rem;font-weight:700;color:var(--navy);">{{ user.username }}</div>
          <div style="color:var(--text-muted);font-size:0.875rem;">{{ user.email }}</div>
          <div style="font-size:0.78rem;color:var(--text-light);margin-top:4px;">Member since {{ user.created_at|date:"F Y" }}</div>
        </div>
      </div>
      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" value="{{ user.email }}">
        </div>
        <div class="form-group">
          <label class="form-label">New Password <span style="color:var(--text-light);font-weight:400;">(leave blank to keep current)</span></label>
          <input type="password" name="new_password" class="form-control" placeholder="New password...">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password...">
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
